name: Publish APT Repository

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils devscripts debhelper dpkg-dev gnupg

      - name: Build Debian package
        run: dpkg-buildpackage -us -uc -b

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: apt-repo
        continue-on-error: true

      - name: Prepare gh-pages workspace
        run: |
          if [ ! -d apt-repo/.git ]; then
            mkdir -p apt-repo
            cd apt-repo
            git init
            git checkout --orphan gh-pages
          fi

      - name: Import signing key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          if [ -z "${APT_GPG_PRIVATE_KEY}" ]; then
            echo "Missing required secret: APT_GPG_PRIVATE_KEY"
            exit 1
          fi
          echo "${APT_GPG_PRIVATE_KEY}" | gpg --batch --import

      - name: Publish package into APT layout
        env:
          APT_GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
        run: |
          if [ -z "${APT_GPG_KEY_ID}" ]; then
            echo "Missing required secret: APT_GPG_KEY_ID"
            exit 1
          fi

          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          DEB_FILE="$(ls ../lin-dos_*_all.deb | head -n 1)"

          mkdir -p apt-repo/pool/main/l/lin-dos
          cp "${DEB_FILE}" apt-repo/pool/main/l/lin-dos/

          mkdir -p apt-repo/dists/stable/main/binary-all
          dpkg-scanpackages --arch all apt-repo/pool > apt-repo/dists/stable/main/binary-all/Packages
          gzip -kf apt-repo/dists/stable/main/binary-all/Packages

          cat > apt-repo/dists/stable/Release <<EOF
Origin: ${OWNER}
Label: ${REPO}
Suite: stable
Codename: stable
Architectures: all
Components: main
Description: LIN-DOS APT repository
EOF

          cd apt-repo/dists/stable
          apt-ftparchive release . >> Release
          gpg --batch --yes --pinentry-mode loopback --default-key "${APT_GPG_KEY_ID}" --clearsign -o InRelease Release
          gpg --batch --yes --pinentry-mode loopback --default-key "${APT_GPG_KEY_ID}" -abs -o Release.gpg Release

      - name: Export public key for users
        env:
          APT_GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
        run: |
          gpg --batch --yes --armor --export "${APT_GPG_KEY_ID}" > apt-repo/lin-dos-archive-keyring.asc

      - name: Commit and push gh-pages
        run: |
          cd apt-repo
          git add .
          if git diff --cached --quiet; then
            echo "No APT repo changes to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Publish APT repository for ${GITHUB_REF_NAME:-manual}"
          git branch -M gh-pages
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push origin gh-pages
